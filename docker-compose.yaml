version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: coopllactia_pg
    environment:
      POSTGRES_DB: coopllactia
      POSTGRES_USER: coopllactia
      POSTGRES_PASSWORD: coopllactia
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coopllactia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
